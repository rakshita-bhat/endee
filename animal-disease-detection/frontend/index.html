<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Animal Disease Finder</title>

    <!-- Bootstrap & FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="fas fa-paw text-success me-2"></i>Animal Disease Finder
            </a>
        </div>
    </nav>

    <div class="main-container">
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-stethoscope me-2"></i>AI Animal Disease Finder</h2>
                <p>Smart symptom-based disease detection using ML</p>
            </div>

            <div class="card-body">
                <form id="predictForm">

                    <div class="mb-4">
                        <label class="form-label">
                            <i class="fas fa-paw text-success me-2"></i>Select Animal
                        </label>
                        <select class="form-select" id="animal" required>
                            <option value="">Choose an animal...</option>
                            <option value="Dog">🐕 Dog</option>
                            <option value="Cat">🐱 Cat</option>
                            <option value="Cow">🐄 Cow</option>
                            <option value="Horse">🐴 Horse</option>
                            <option value="Chicken">🐔 Chicken</option>
                            <option value="Pig">🐷 Pig</option>
                            <option value="Sheep">🐑 Sheep</option>
                            <option value="Goat">🐐 Goat</option>
                            <option value="Duck">🦆 Duck</option>
                            <option value="Turkey">🦃 Turkey</option>
                            <option value="Rabbit">🐰 Rabbit</option>
                            <option value="Fish">🐟 Fish</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            <i class="fas fa-notes-medical text-success me-2"></i>Describe Symptoms
                        </label>
                        <textarea class="form-control" id="symptoms" rows="4"
                            placeholder="e.g., fever, vomiting, loss of appetite..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-analyze" id="analyzeBtn">
                        <span class="btn-text">
                            <i class="fas fa-search me-2"></i>Analyze Symptoms
                        </span>
                        <span class="btn-loading" style="display: none;">
                            <span class="spinner-border spinner-border-sm me-2"></span>Analyzing...
                        </span>
                    </button>
                </form>

                <div class="loading-spinner" id="loading">
                    <div class="spinner-border text-success"></div>
                    <p class="mt-3 text-muted">Analyzing symptoms...</p>
                </div>

                <div class="alert alert-danger error-alert" id="errorAlert">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    <span id="errorMessage"></span>
                </div>

                <div id="results" style="display: none;">
                    <div class="result-card">
                        <div class="d-flex justify-content-between flex-wrap">
                            <h4 id="diseaseName"></h4>
                            <span id="confidence" class="confidence-badge"></span>
                        </div>

                        <div class="info-section">
                            <h5>Explanation</h5>
                            <p id="explanation"></p>
                        </div>

                        <div class="info-section">
                            <h5>Precautions</h5>
                            <p id="precautions"></p>
                        </div>

                        <div>
                            <h5>Top Matching Cases</h5>
                            <div id="topMatches"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <footer>
            <p>Helping you detect animal diseases quickly & accurately</p>
        </footer>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- External JS -->
    <script src="./script.js"></script>
</body>
</html>
